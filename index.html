<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rockstar Games | Grand Theft Auto VI</title>
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: "Helvetica Neue", Arial, sans-serif; text-align: center; }
        nav { background: #000; height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .rs-logo { height: 40px; }
        .menu { display: flex; gap: 20px; }
        .menu a { color: #fff; text-decoration: none; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .hero { padding: 40px 20px; }
        .main-poster { max-width: 800px; width: 100%; box-shadow: 0 0 50px rgba(255,255,255,0.1); }
        .release-section { margin-top: 20px; }
        .release-img { max-width: 600px; width: 90%; }
        .preorder-container { margin: 40px 0; display: flex; justify-content: center; gap: 20px; }
        .btn { background: #fff; color: #000; padding: 15px 30px; font-weight: 900; text-transform: uppercase; border: none; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn:hover { background: #fcaf17; }
        .message-box { max-width: 700px; margin: 60px auto; padding: 30px; border: 1px solid #222; background: #050505; line-height: 1.6; }
        #prank-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        #prank-overlay img { border-radius: 20px; max-width: 250px; margin-bottom: 20px; }
        .close-btn { margin-top: 20px; background: transparent; color: #666; border: none; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
<nav>
    <img src="logo.jpg" class="rs-logo">
    <div class="menu"><a href="#">Games</a><a href="#">Newswire</a><a href="#">Videos</a><a href="#">Store</a></div>
</nav>
<div class="hero"><img src="poster.png" class="main-poster"></div>
<div class="release-section"><img src="release.jpg" class="release-img"></div>
<div class="preorder-container">
    <button class="btn" onclick="showP()">Pre-Order PS5</button>
    <button class="btn" onclick="showP()">Pre-Order Xbox Series X|S</button>
</div>
<div class="message-box">
    <h2 style="border-bottom: 2px solid #fcaf17; display: inline-block;">A MESSAGE FROM THE TEAM</h2>
    <p>We are thrilled to share the release window for the next chapter in the Grand Theft Auto series.</p>
    <p><strong>See you in Leonida on May 26, 2026.</strong></p>
</div>
<div id="prank-overlay">
    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZ2h6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3AmbGl2ZT1zZWFyY2g/3o7TKSjPqcKGRZaO3u/giphy.gif">
    <h1 style="color:#fcaf17">HAPPY APRIL FOOLS!</h1>
    <p>Gotcha! Rockstar hasn't announced the date yet.</p>
    <button class="close-btn" onclick="hideP()">[Close]</button>
</div>
<script>
    function showP() { document.getElementById('prank-overlay').style.display = 'flex'; }
    function hideP() { document.getElementById('prank-overlay').style.display = 'none'; }
</script>
</body>
</html>
